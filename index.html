<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axolotl World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; border: 2px solid #6633aa; }
  #hud { color: #cc99ff; font-family: 'Courier New', monospace; font-size: 13px; background: #06041a; width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; gap: 8px; }
  #jumpstate { color: #ffdd00; font-weight: bold; flex: 1; text-align: center; }
  #zoom-wrap { display: flex; align-items: center; gap: 4px; }
  #zoom-wrap label { color: #adf; white-space: nowrap; }
  #zoom-slider { width: 80px; accent-color: #5c94fc; }
  #zoom-val { color: #ffdd00; width: 34px; text-align: right; }

  /* Settings panel */
  #settings-btn { position: fixed; top: 8px; right: 8px; background: #333; color: #fff; border: 1px solid #666; font-family: monospace; font-size: 13px; padding: 4px 10px; cursor: pointer; z-index: 100; }
  #settings-btn:hover { background: #555; }
  #settings-panel {
    display: none; position: fixed; top: 36px; right: 8px; background: #1a1a1a;
    border: 2px solid #5c94fc; color: #fff; font-family: monospace; font-size: 13px;
    padding: 14px 16px; z-index: 99; width: 290px; max-height: 80vh; overflow-y: auto;
  }
  #settings-panel.open { display: block; }
  #settings-panel h3 { color: #f8d800; margin-bottom: 10px; font-size: 14px; letter-spacing: 1px; }
  #settings-panel label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
  #settings-panel span.lbl { flex: 1; color: #adf; }
  #settings-panel input[type=range] { flex: 1; accent-color: #5c94fc; }
  #settings-panel span.val { width: 44px; text-align: right; color: #ffdd00; }
  #settings-panel button { margin-top: 10px; width: 100%; padding: 5px; background: #c84c0c; border: none; color: #fff; font-family: monospace; font-size: 13px; cursor: pointer; }
  #settings-panel button:hover { background: #e86020; }
  #settings-panel hr { border-color: #444; margin: 10px 0; }
</style>
</head>
<body>
<div id="hud">
  <span>AXO <span id="score">000000</span></span>
  <span id="jumpstate">—</span>
  <span>ORBS <span id="coins">00</span></span>
  <div id="zoom-wrap">
    <label>ZOOM</label>
    <input type="range" id="zoom-slider" min="0.3" max="2.0" step="0.05" value="1">
    <span id="zoom-val">1.00x</span>
  </div>
</div>
<canvas id="c" width="800" height="450"></canvas>

<button id="settings-btn">⚙ Settings</button>
<div id="settings-panel">
  <h3>⚙ SETTINGS</h3>

  <label><span class="lbl">Gravity (default)</span>
    <input type="range" id="s-gravity" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity"></span>
  </label>
  <label><span class="lbl">Gravity jump 1</span>
    <input type="range" id="s-gravity1" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity1"></span>
  </label>
  <label><span class="lbl">Gravity jump 2</span>
    <input type="range" id="s-gravity2" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity2"></span>
  </label>
  <label><span class="lbl">Gravity jump 3</span>
    <input type="range" id="s-gravity3" min="0.02" max="1.0" step="0.01">
    <span class="val" id="v-gravity3"></span>
  </label>
  <label><span class="lbl">Jump 1 height</span>
    <input type="range" id="s-jump1" min="0.5" max="25" step="0.1">
    <span class="val" id="v-jump1"></span>
  </label>
  <label><span class="lbl">Jump 2 height</span>
    <input type="range" id="s-jump2" min="0.5" max="25" step="0.1">
    <span class="val" id="v-jump2"></span>
  </label>
  <label><span class="lbl">Jump 3 height</span>
    <input type="range" id="s-jump3" min="0.5" max="25" step="0.1">
    <span class="val" id="v-jump3"></span>
  </label>
  <label><span class="lbl">Chain window (ms)</span>
    <input type="range" id="s-window" min="50" max="800" step="10">
    <span class="val" id="v-window"></span>
  </label>

  <hr>

  <label><span class="lbl">Move speed</span>
    <input type="range" id="s-speed" min="1" max="20" step="0.5">
    <span class="val" id="v-speed"></span>
  </label>
  <label><span class="lbl">Axo size (px)</span>
    <input type="range" id="s-size" min="16" max="96" step="2">
    <span class="val" id="v-size"></span>
  </label>

  <hr>

  <button id="s-reset">Reset defaults</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const axoImg = new Image();
axoImg.src = 'axo.png';

const W = 800, H = 450;
const TILE = 32;

const DEFAULTS = {
  gravity:  0.32,
  gravity1: 0.24,
  gravity2: 0.26,
  gravity3: 0.15,
  jump1: 6.4,
  jump2: 9.4,
  jump3: 8.2,
  tripleWindow: 350,
  moveSpeed: 3.5,
  axoSize: 44,
};
const CFG = { ...DEFAULTS };
const CAM_EASE = 0.12;

let zoom = 1.0;

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });
function pressed(codes) { return codes.some(c => keys[c]); }

// ── Colours ──────────────────────────────────────────────────────────────────
const COLORS = {
  sky:     '#0a0a1e',
  hill:    '#1a1a3a', hillDk: '#0d0d22',
  ground:  '#2a2040', groundTop: '#3a2e5a', groundHi: '#4a3e6a',
  stone:   '#3a3050', stoneDk: '#2a2040', stoneHi: '#5a4870',
  crystal: '#4a1a6a', crystalHi: '#8a3aaa', crystalGlow: '#cc66ff',
  column:  '#1e2a3a', columnHi: '#2e3a4a',
  orb:     '#00ffcc', orbDim: '#00aa88',
  pole:    '#445566',
};

// ── Sonic-style level (600 tiles wide) ───────────────────────────────────────
const LEVEL_W_TILES = 620;
const groundY = 12;

// Gaps: array of {x, w} in tiles
const GROUND_GAPS = [
  { x:80,  w:5 },
  { x:140, w:6 },
  { x:220, w:8 },
  { x:300, w:5 },
  { x:380, w:9 },
  { x:460, w:6 },
  { x:530, w:7 },
  { x:580, w:5 },
];

function groundInGap(tx) {
  return GROUND_GAPS.some(g => tx >= g.x && tx < g.x + g.w);
}

// Platforms: long Sonic-style stretches, speed ramps, high paths
const platforms = [
  // early low platforms

  { x:18, y:9,  w:3, t:'qblock' },

  { x:42, y:6,  w:6, t:'brick' },
  { x:52, y:5,  w:4, t:'qblock' },
  // after first gap — high road
  { x:87, y:6,  w:8, t:'brick' },
  { x:98, y:5,  w:5, t:'qblock' },
  { x:106,y:4,  w:8, t:'brick' },
  // long low platform
  { x:115,y:10, w:12,t:'brick' },
  { x:128,y:8,  w:6, t:'qblock' },
  // after second gap
  { x:148,y:6,  w:10,t:'brick' },
  { x:160,y:4,  w:6, t:'qblock' },

  { x:178,y:8,  w:5, t:'qblock' },

  // third section — big staircase up
  { x:196,y:10, w:3, t:'brick' },
  { x:200,y:8,  w:3, t:'brick' },
  { x:204,y:6,  w:3, t:'brick' },

  { x:230,y:3,  w:20,t:'brick' },

  { x:307,y:5,  w:12,t:'brick' },
  { x:322,y:3,  w:8, t:'qblock' },

  { x:353,y:9,  w:8, t:'brick' },
  // fifth — zigzag
  { x:363,y:7,  w:4, t:'brick' },
  { x:370,y:5,  w:4, t:'qblock' },
  { x:377,y:3,  w:4, t:'brick' },
  // after fifth gap
  { x:391,y:4,  w:14,t:'brick' },
  { x:408,y:6,  w:8, t:'qblock' },
  { x:418,y:8,  w:6, t:'brick' },
  { x:427,y:6,  w:6, t:'qblock' },
  { x:436,y:4,  w:8, t:'brick' },
  { x:447,y:3,  w:5, t:'qblock' },
  // after sixth gap
  { x:468,y:6,  w:10,t:'brick' },

  { x:519,y:8,  w:6, t:'qblock' },
  // after seventh gap
  { x:539,y:6,  w:12,t:'brick' },
  { x:554,y:4,  w:8, t:'qblock' },
  { x:564,y:6,  w:8, t:'brick' },
  { x:574,y:8,  w:5, t:'qblock' },
  // approach to final gap and flag
  { x:588,y:7,  w:8, t:'brick' },
  { x:598,y:5,  w:6, t:'qblock' },
  { x:606,y:3,  w:8, t:'brick' },
];

// Pipes
const pipes = [
  { x:20,  h:2 }, { x:45,  h:3 }, { x:65,  h:4 },
  { x:120, h:2 }, { x:160, h:3 }, { x:200, h:2 },
  { x:270, h:4 }, { x:310, h:3 }, { x:360, h:2 },
  { x:420, h:3 }, { x:470, h:4 }, { x:520, h:2 },
  { x:560, h:3 }, { x:600, h:2 },
];

// Coins — dense Sonic-style arcs and lines
const coinDefs = [];
function coinLine(x1, x2, y) { for (let x = x1; x <= x2; x++) coinDefs.push({ x, y }); }
function coinArc(cx, y, r, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.PI + (Math.PI * i / (count - 1));
    coinDefs.push({ x: Math.round(cx + Math.cos(a) * r), y: Math.round(y + Math.sin(a) * r * 0.6) });
  }
}
coinLine(2, 14, 10);
coinLine(18, 30, 9);
coinLine(36, 50, 8);
coinArc(60, 9, 5, 7);
coinLine(88, 112, 5);
coinArc(130, 8, 4, 6);
coinLine(148, 170, 5);
coinArc(195, 8, 5, 7);
coinLine(230, 248, 3);
coinLine(263, 280, 6);
coinLine(307, 328, 5);
coinArc(340, 6, 4, 6);
coinLine(363, 388, 4);
coinLine(392, 410, 4);
coinArc(430, 5, 5, 7);
coinLine(468, 496, 5);
coinLine(540, 562, 5);
coinLine(575, 600, 6);

// Goombas
const goombaDefs = [
  { x:15,  pl:10,  pr:20  },
  { x:35,  pl:30,  pr:42  },
  { x:60,  pl:55,  pr:70  },
  { x:90,  pl:87,  pr:100 },
  { x:120, pl:115, pr:130 },
  { x:150, pl:145, pr:162 },
  { x:195, pl:190, pr:205 },
  { x:235, pl:230, pr:248 },
  { x:280, pl:275, pr:293 },
  { x:320, pl:315, pr:332 },
  { x:365, pl:360, pr:377 },
  { x:410, pl:405, pr:425 },
  { x:450, pl:445, pr:460 },
  { x:475, pl:470, pr:488 },
  { x:542, pl:538, pr:552 },
  { x:568, pl:563, pr:578 },
  { x:595, pl:590, pr:608 },
];

// Flying enemies [tileX, floatY in pixels from top, patrol width in tiles]
const flyerDefs = [
  { x:25,  fy:7*TILE, pw:8  },
  { x:55,  fy:6*TILE, pw:6  },
  { x:95,  fy:5*TILE, pw:10 },
  { x:130, fy:6*TILE, pw:7  },
  { x:170, fy:5*TILE, pw:8  },
  { x:210, fy:4*TILE, pw:6  },
  { x:255, fy:5*TILE, pw:9  },
  { x:310, fy:6*TILE, pw:8  },
  { x:350, fy:5*TILE, pw:7  },
  { x:395, fy:4*TILE, pw:10 },
  { x:440, fy:6*TILE, pw:6  },
  { x:480, fy:5*TILE, pw:8  },
  { x:525, fy:6*TILE, pw:7  },
  { x:565, fy:4*TILE, pw:9  },
  { x:600, fy:5*TILE, pw:6  },
];

const FLAG_X = 610;

// ── State ────────────────────────────────────────────────────────────────────
let score = 0, coinCount = 0, dead = false, won = false;

const player = {
  x: 48, y: 0,
  vx: 0, vy: 0,
  w: 44, h: 44,
  onGround: false,
  jumpCount: 0,
  lastLandTime: 0,
  spinAngle: 0,
  spinning: false,   // triple jump spin (continues until landing)
  homing: false,     // homing attack active
  homingTarget: null,
  homingUsed: false, // can only home once per airborne
  dir: 1,
  dead: false,
  wonSlide: false,
};

let camera  = 0;
let cameraY = 0;

let coins   = coinDefs.map((c, i) => ({ id: i, x: c.x * TILE, y: c.y * TILE, collected: false, bobTimer: Math.random() * Math.PI * 2 }));
let goombas = goombaDefs.map((g, i) => ({ id: i, x: g.x * TILE, y: groundY * TILE - TILE, vx: -1.4, w: TILE, h: TILE, dead: false, deadTimer: 0, pl: g.pl * TILE, pr: g.pr * TILE, frame: 0, flying: false }));
let flyers  = flyerDefs.map((f, i) => ({ id: i + 1000, x: f.x * TILE, baseY: f.fy, y: f.fy, vx: 1.2, w: TILE, h: TILE, dead: false, deadTimer: 0, pl: f.x * TILE, pr: (f.x + f.pw) * TILE, frame: 0, flying: true, wobble: Math.random() * Math.PI * 2 }));
let blockHit = {};

// ── Solids ────────────────────────────────────────────────────────────────────
function buildSolids() {
  const solids = [];
  for (let tx = 0; tx < LEVEL_W_TILES; tx++) {
    if (groundInGap(tx)) continue;
    for (let ty = groundY; ty <= groundY + 2; ty++)
      solids.push({ x: tx * TILE, y: ty * TILE, w: TILE, h: TILE, type: 'ground', tx, ty });
  }
  for (const p of platforms) {
    for (let i = 0; i < p.w; i++) {
      const tx = p.x + i, key = `${tx}_${p.y}`;
      solids.push({ x: tx * TILE, y: p.y * TILE, w: TILE, h: TILE, type: p.t, tx, ty: p.y, key });
    }
  }
  for (const pipe of pipes) {
    for (let j = 0; j < pipe.h; j++) {
      const ty = groundY - j;
      solids.push({ x: pipe.x * TILE, y: ty * TILE, w: TILE * 2, h: TILE, type: j === 0 ? 'pipetop' : 'pipe', tx: pipe.x, ty });
    }
  }
  return solids;
}
const solids = buildSolids();

function getSolidsNear(px, py, pw, ph) {
  return solids.filter(s => s.x < px + pw + 96 && s.x + s.w > px - 96 && s.y < py + ph + 96 && s.y + s.h > py - 96);
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── HUD elements ─────────────────────────────────────────────────────────────
const jumpEl  = document.getElementById('jumpstate');
const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coins');

function jumpLabel() {
  if (player.wonSlide)  return '★ YOU WIN ★';
  if (player.dead)      return '✕ DEAD ✕';
  if (player.homing)    return '🎯 HOMING!';
  if (player.onGround)  return player.jumpCount === 0 ? '— READY —' : '— LANDED —';
  if (player.jumpCount === 1) return '① JUMP';
  if (player.jumpCount === 2) return '② DOUBLE';
  if (player.jumpCount === 3) return '③ TRIPLE SPIN!';
  return '—';
}

function updateHUD() {
  scoreEl.textContent = String(score).padStart(6, '0');
  coinsEl.textContent = String(coinCount).padStart(2, '0');
  jumpEl.textContent  = jumpLabel();
}

// ── Particles ────────────────────────────────────────────────────────────────
const coinParticles = [];
const dustParticles = [];
const trailParticles = [];
const spindashParticles = [];

function spawnCoinPop(x, y) {
  coinParticles.push({ x, y, vy: -6, life: 40, maxLife: 40 });
  coinCount++;
  coinsEl.textContent = String(coinCount).padStart(2, '0');
}

function spawnDust(x, y, count = 6) {
  for (let i = 0; i < count; i++) {
    dustParticles.push({
      x: x + (Math.random() - 0.5) * 24,
      y,
      vx: (Math.random() - 0.5) * 3,
      vy: -(Math.random() * 2 + 0.3),
      r: Math.random() * 5 + 3,
      life: 20 + Math.floor(Math.random() * 14),
      maxLife: 34,
    });
  }
}

function spawnTrail(x, y) {
  trailParticles.push({
    x, y,
    r: Math.random() * 6 + 4,
    life: 20 + Math.floor(Math.random() * 8),
    maxLife: 28,
    hue: Math.random() * 60 + 180,
  });
}

function spawnSpindash(x, y, dir) {
  for (let i = 0; i < 3; i++) {
    spindashParticles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vx: -dir * (Math.random() * 4 + 2),
      vy: (Math.random() - 0.5) * 2,
      r: Math.random() * 4 + 2,
      life: 16 + Math.floor(Math.random() * 10),
      maxLife: 26,
    });
  }
}

// ── Physics ───────────────────────────────────────────────────────────────────
const HOMING_RANGE = 300; // px
const HOMING_SPEED = 14;

let prevJumpKey = false;

function nearestLiveGoomba() {
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  let best = null, bestDist = Infinity;
  for (const g of [...goombas, ...flyers]) {
    if (g.dead) continue;
    const gx = g.x + g.w / 2, gy = g.y + g.h / 2;
    const dist = Math.hypot(px - gx, py - gy);
    if (dist < HOMING_RANGE && dist < bestDist) { best = g; bestDist = dist; }
  }
  return best;
}

function update(dt) {
  if (won && !player.wonSlide) return;
  if (dead) return;

  player.w = CFG.axoSize;
  player.h = CFG.axoSize;

  const now = performance.now();
  const goLeft  = pressed(['ArrowLeft',  'KeyA']);
  const goRight = pressed(['ArrowRight', 'KeyD']);
  const jumpKey = pressed(['ArrowUp', 'KeyW', 'Space']);
  const jumpJustPressed = jumpKey && !prevJumpKey;
  prevJumpKey = jumpKey;

  if (player.wonSlide) {
    player.vy = 2.5; player.vx = 0;
    player.y += player.vy;
    if (player.y + player.h >= groundY * TILE) player.y = groundY * TILE - player.h;
    camera += (Math.min(player.x - W / 3, LEVEL_W_TILES * TILE - W) - camera) * CAM_EASE;
    return;
  }

  // Homing attack — Space while airborne
  if (jumpJustPressed && !player.onGround && !player.homing && !player.homingUsed) {
    const target = nearestLiveGoomba();
    if (target) {
      player.homing = true;
      player.homingTarget = target;
      player.homingUsed = true;
      // Lock-on flash
      target.lockFlash = 10;
    }
  }

  // Drive homing movement
  if (player.homing && player.homingTarget) {
    const tg = player.homingTarget;
    if (tg.dead) {
      // Target already dead — cancel
      player.homing = false; player.homingTarget = null;
    } else {
      const tx = tg.x + tg.w / 2, ty = tg.y + tg.h / 2;
      const px = player.x + player.w / 2, py = player.y + player.h / 2;
      const dx = tx - px, dy = ty - py;
      const dist = Math.hypot(dx, dy);
      if (dist < 12) {
        // Hit! Kill goomba, bounce up
        tg.dead = true; tg.deadTimer = 40;
        score += 200; updateHUD();
        player.homing = false; player.homingTarget = null;
        player.vy = -CFG.jump1 * 0.85;
        player.vx = player.dir * CFG.moveSpeed * 0.5;
        player.spinning = false;
        spawnDust(tg.x + tg.w / 2, tg.y, 10);
        // Allow another homing after killing this one
        player.homingUsed = false;
      } else {
        // Fly toward target
        player.vx = (dx / dist) * HOMING_SPEED;
        player.vy = (dy / dist) * HOMING_SPEED;
        if (player.vx > 0) player.dir = 1;
        else if (player.vx < 0) player.dir = -1;
        spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
      }
    }
  }

  // Normal movement (not homing)
  if (!player.homing) {
    if (goRight) { player.vx = CFG.moveSpeed; player.dir = 1; }
    else if (goLeft) { player.vx = -CFG.moveSpeed; player.dir = -1; }
    else player.vx *= 0.75;
  }

  // Jump (ground only)
  if (jumpJustPressed && player.onGround) {
    const timeSinceLand = now - player.lastLandTime;
    let tier = 1;
    if (player.jumpCount >= 1 && timeSinceLand < CFG.tripleWindow) tier = player.jumpCount + 1;
    if (tier > 3) tier = 1;
    player.jumpCount = tier;
    if (tier === 1) player.vy = -CFG.jump1;
    else if (tier === 2) player.vy = -CFG.jump2;
    else { player.vy = -CFG.jump3; player.spinning = true; player.spinAngle = 0; }
    player.onGround = false;
    player.homingUsed = false; // reset homing on each new jump
  }

  // Triple jump spin + homing spin
  if (player.spinning) {
    player.spinAngle += 18;
    if (Math.random() < 0.6) spawnTrail(player.x + player.w / 2, player.y + player.h / 2);
  }
  if (player.homing) {
    player.spinAngle += 28;
  }

  // Gravity (suppressed during homing)
  if (!player.homing) {
    const g = player.onGround ? CFG.gravity
      : player.jumpCount === 1 ? CFG.gravity1
      : player.jumpCount === 2 ? CFG.gravity2
      : player.jumpCount === 3 ? CFG.gravity3
      : CFG.gravity;
    player.vy += g;
    if (player.vy > 20) player.vy = 20;
  }

  // Move X
  player.x += player.vx;
  player.x = Math.max(0, player.x);

  // Collide X
  const nearX = getSolidsNear(player.x, player.y, player.w, player.h);
  for (const s of nearX) {
    if (rectsOverlap({ x: player.x, y: player.y + 2, w: player.w, h: player.h - 4 }, s)) {
      if (player.vx > 0) player.x = s.x - player.w;
      else if (player.vx < 0) player.x = s.x + s.w;
      player.vx = 0;
      if (player.homing) { player.homing = false; player.homingTarget = null; }
    }
  }

  // Move Y
  const wasOnGround = player.onGround;
  player.onGround = false;
  player.y += player.vy;

  const nearY = getSolidsNear(player.x, player.y, player.w, player.h);
  for (const s of nearY) {
    if (rectsOverlap({ x: player.x + 2, y: player.y, w: player.w - 4, h: player.h }, s)) {
      if (player.vy > 0) {
        player.y = s.y - player.h;
        player.vy = 0;
        if (!wasOnGround) {
          player.lastLandTime = now;
          spawnDust(player.x + player.w / 2, player.y + player.h);
          player.spinning = false;
          player.homing = false; player.homingTarget = null;
        }
        player.onGround = true;
        player.homingUsed = false;
      } else if (player.vy < 0) {
        player.y = s.y + s.h;
        player.vy = 1;
        hitBlock(s);
        if (player.homing) { player.homing = false; player.homingTarget = null; }
      }
    }
  }

  if (!player.onGround && wasOnGround && player.jumpCount === 0) player.jumpCount = 1;

  // Pit death
  if (player.y > H + 200) { killPlayer(); return; }

  // Coins
  for (const coin of coins) {
    if (coin.collected) continue;
    coin.bobTimer += 0.05;
    if (rectsOverlap({ x: coin.x + 4, y: coin.y + 4, w: TILE - 8, h: TILE - 8 }, { x: player.x, y: player.y, w: player.w, h: player.h })) {
      coin.collected = true; coinCount++; score += 200; updateHUD();
    }
  }

  // Ground enemies + flyers — unified update
  const allEnemies = [...goombas, ...flyers];
  for (const g of allEnemies) {
    if (g.dead) { g.deadTimer--; if (g.lockFlash) g.lockFlash--; continue; }
    if (g.lockFlash) g.lockFlash--;
    g.x += g.vx;
    if (g.x <= g.pl || g.x + g.w >= g.pr) g.vx *= -1;
    g.frame += 0.08;
    if (g.flying) {
      g.wobble += 0.04;
      g.y = g.baseY + Math.sin(g.wobble) * 18;
    }
    const gr = { x: g.x + 2, y: g.y + 2, w: g.w - 4, h: g.h - 4 };
    const pr = { x: player.x, y: player.y, w: player.w, h: player.h };
    if (rectsOverlap(gr, pr)) {
      if (player.spinning || (!g.flying && player.vy > 0 && player.y + player.h < g.y + g.h / 2 + 10)) {
        g.dead = true; g.deadTimer = 40; player.vy = Math.min(player.vy, -6);
        score += 100; updateHUD();
      } else if (!player.homing) {
        killPlayer(); return;
      }
    }
  }

  // Flag
  if (player.x + player.w > FLAG_X * TILE && !won) {
    won = true; player.wonSlide = true;
    player.x = FLAG_X * TILE - player.w + 6; player.vx = 0;
    score += 1000; updateHUD();
  }

  // Camera X
  const targetCam = player.x - W / 3;
  camera += (Math.min(Math.max(targetCam, 0), LEVEL_W_TILES * TILE - W) - camera) * CAM_EASE;

  // Camera Y
  const targetCamY = player.y - H / 2;
  cameraY += (Math.min(Math.max(targetCamY, groundY * TILE - H), 0) - cameraY) * CAM_EASE;

  updateHUD();
}

function hitBlock(s) {
  if (!s.key || blockHit[s.key]) return;
  blockHit[s.key] = true;
  if (s.type === 'qblock') { spawnCoinPop(s.x + TILE / 2, s.y - TILE); score += 200; }
  else if (s.type === 'brick') score += 50;
  updateHUD();
}

function killPlayer() {
  if (dead) return;
  dead = true; player.dead = true; player.vy = -12; player.vx = 0;
  setTimeout(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
    ctx.font = '24px monospace';
    ctx.fillText('Press R to restart', W / 2, H / 2 + 20);
  }, 1500);
}

document.addEventListener('keydown', e => { if (e.code === 'KeyR' && dead) location.reload(); });

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawBg() {
  const t = performance.now() / 3000;
  // Distant mountains / alien spires
  for (let i = 0; i < 28; i++) {
    const bx = (i * 340 + 60) - camera * 0.18;
    const by = 420 + cameraY * 0.06;
    const bw = 60 + (i % 4) * 30;
    const bh = 80 + (i % 5) * 40;
    ctx.fillStyle = i % 3 === 0 ? '#1a1030' : '#13102a';
    ctx.beginPath();
    ctx.moveTo(bx - bw, by);
    ctx.lineTo(bx, by - bh);
    ctx.lineTo(bx + bw, by);
    ctx.fill();
    // Glowing tip
    ctx.fillStyle = `hsla(${270 + i * 13}, 70%, 55%, 0.3)`;
    ctx.beginPath(); ctx.arc(bx, by - bh + 4, 4, 0, Math.PI*2); ctx.fill();
  }
  // Nebula wisps
  for (let i = 0; i < 20; i++) {
    const nx = (i * 520 + 100) - camera * 0.3;
    const ny = 40 + (i % 5) * 30 + cameraY * 0.12;
    ctx.globalAlpha = 0.07 + 0.04 * Math.sin(t + i);
    ctx.fillStyle = `hsl(${260 + i * 20}, 80%, 60%)`;
    ctx.beginPath(); ctx.ellipse(nx, ny, 80 + i * 10, 18 + i % 5 * 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Stars (fixed to bg layer)
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 397 + 50) % (LEVEL_W_TILES * TILE)) - camera * 0.05;
    const sy = 10 + (i * 137 % 280) + cameraY * 0.02;
    const sr = 0.5 + (i % 3) * 0.5;
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(t * 2 + i);
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  for (let tx = 0; tx < LEVEL_W_TILES; tx++) {
    if (groundInGap(tx)) continue;
    const sx = tx * TILE - camera;
    if (sx < -TILE || sx > W + TILE) continue;
    for (let ty = groundY; ty <= groundY + 2; ty++) drawGroundTile(sx, ty * TILE, ty === groundY);
  }
}

function drawGroundTile(sx, sy, isTop) {
  ctx.fillStyle = isTop ? COLORS.groundTop : COLORS.ground;
  ctx.fillRect(sx, sy, TILE, TILE);
  if (isTop) {
    ctx.fillStyle = COLORS.groundHi;
    ctx.fillRect(sx + 1, sy + 1, TILE - 2, 3);
    // Occasional crystal shard on top
    if ((Math.floor(sx / TILE + camera / TILE) * 7 + 3) % 11 === 0) {
      ctx.fillStyle = COLORS.crystalGlow;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(sx + TILE/2, sy - 5);
      ctx.lineTo(sx + TILE/2 - 3, sy);
      ctx.lineTo(sx + TILE/2 + 3, sy);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  } else {
    ctx.fillStyle = COLORS.stoneDk;
    ctx.fillRect(sx, sy, 2, TILE);
    ctx.fillRect(sx, sy + TILE/2, TILE, 1);
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    for (let i = 0; i < p.w; i++) {
      const tx = p.x + i, sx = tx * TILE - camera;
      if (sx < -TILE || sx > W + TILE) continue;
      const key = `${tx}_${p.y}`;
      drawBlock(sx, p.y * TILE, blockHit[key] ? 'used' : p.t);
    }
  }
}

function drawBlock(sx, sy, type) {
  if (type === 'brick') {
    // Stone block
    ctx.fillStyle = COLORS.stone; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.stoneDk;
    ctx.fillRect(sx, sy + TILE/2 - 1, TILE, 2);
    ctx.fillRect(sx + TILE/3, sy, 1, TILE/2);
    ctx.fillRect(sx + 2*TILE/3, sy + TILE/2, 1, TILE/2);
    ctx.fillStyle = COLORS.stoneHi;
    ctx.fillRect(sx + 1, sy + 1, TILE - 2, 2);
  } else if (type === 'qblock') {
    // Crystal block — glowing
    const t = performance.now() / 600;
    ctx.fillStyle = COLORS.crystal; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.crystalHi;
    ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(t);
    ctx.fillStyle = COLORS.crystalGlow;
    ctx.fillRect(sx + 6, sy + 6, TILE - 12, TILE - 12);
    ctx.globalAlpha = 1;
    // ✦ glyph
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('✦', sx + TILE/2, sy + TILE - 9);
  } else {
    // Used crystal — dim
    ctx.fillStyle = COLORS.stoneDk; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.stone;
    ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
  }
}

function drawPipes() {
  for (const pipe of pipes) {
    const sx = pipe.x * TILE - camera;
    if (sx < -64 || sx > W + 64) continue;
    for (let j = 0; j < pipe.h; j++) drawPipeTile(sx, (groundY - j) * TILE, j === 0);
  }
}

function drawPipeTile(sx, sy, isTop) {
  const pw = TILE * 2;
  // Stone column body
  ctx.fillStyle = COLORS.column; ctx.fillRect(sx, sy, pw, TILE);
  ctx.fillStyle = COLORS.columnHi;
  ctx.fillRect(sx + 4, sy, 6, TILE);
  ctx.fillRect(sx + pw - 10, sy, 4, TILE);
  ctx.fillStyle = '#111a22';
  ctx.fillRect(sx, sy, 3, TILE);
  ctx.fillRect(sx + pw - 3, sy, 3, TILE);
  if (isTop) {
    // Capital / carved top
    ctx.fillStyle = '#2e3e50'; ctx.fillRect(sx - 5, sy, pw + 10, 12);
    ctx.fillStyle = '#3e4e60'; ctx.fillRect(sx - 3, sy, pw + 6, 4);
    // Glowing rune
    const t = performance.now() / 900;
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(t);
    ctx.fillStyle = COLORS.crystalGlow;
    ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText('ᚠ', sx + pw/2, sy + 10);
    ctx.globalAlpha = 1;
  }
}

function drawCoins() {
  const t = performance.now() / 400;
  for (const coin of coins) {
    if (coin.collected) continue;
    const sx = coin.x + TILE/2 - camera;
    if (sx < -TILE || sx > W + TILE) continue;
    const sy = coin.y + TILE/2 + Math.sin(coin.bobTimer) * 3;
    // Glow
    ctx.globalAlpha = 0.25 + 0.15 * Math.sin(t + coin.id);
    ctx.fillStyle = COLORS.orb;
    ctx.beginPath(); ctx.arc(sx, sy, 11, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Core
    ctx.fillStyle = COLORS.orb;
    ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#aaffee';
    ctx.beginPath(); ctx.arc(sx - 1.5, sy - 1.5, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawLockOn(g) {
  const sx = g.x + g.w / 2 - camera;
  const sy = g.y + g.h / 2;
  const t = performance.now() / 150;
  const r = g.w * 0.8 + Math.sin(t) * 4;
  ctx.save();
  ctx.strokeStyle = '#ffff00';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.85;
  // Corner brackets
  const hs = r * 0.5;
  for (const [ox, oy, sx2, sy2] of [[-r,-r,1,0],[-r,-r,0,1],[r,-r,-1,0],[r,-r,0,1],[-r,r,1,0],[-r,r,0,-1],[r,r,-1,0],[r,r,0,-1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + ox, sy + oy);
    ctx.lineTo(sx + ox + sx2 * hs, sy + oy + sy2 * hs);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEnemy(g) {
  const sx = g.x - camera;
  if (sx < -TILE * 2 || sx > W + TILE * 2) return;
  if (player.homingTarget === g || g.lockFlash > 0) drawLockOn(g);
  const cx = sx + g.w / 2, cy = g.y + g.h / 2;
  const wf = Math.floor(g.frame) % 2;
  const t = performance.now() / 400;

  if (g.flying) {
    // Bat-like flying creature — purple, wings flapping
    const wingSpan = 18 + Math.sin(t * 3 + g.wobble) * 6;
    ctx.fillStyle = '#6a1a9a';
    // Body
    ctx.beginPath(); ctx.ellipse(cx, cy, 9, 7, 0, 0, Math.PI*2); ctx.fill();
    // Wings
    ctx.fillStyle = '#8a2ac0';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 2);
    ctx.lineTo(cx - wingSpan, cy - 4 - Math.abs(Math.sin(t*3+g.wobble))*8);
    ctx.lineTo(cx - wingSpan + 8, cy + 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, cy - 2);
    ctx.lineTo(cx + wingSpan, cy - 4 - Math.abs(Math.sin(t*3+g.wobble))*8);
    ctx.lineTo(cx + wingSpan - 8, cy + 4);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4466';
    ctx.beginPath(); ctx.arc(cx - 3, cy - 1, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3, cy - 1, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(cx - 3, cy - 1, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3, cy - 1, 1, 0, Math.PI*2); ctx.fill();
  } else {
    // Ground blob creature — teal-green alien
    const squish = wf ? 1.1 : 0.95;
    ctx.save(); ctx.translate(cx, g.y + g.h);
    ctx.scale(1 / squish, squish);
    // Body
    ctx.fillStyle = '#1a6a4a';
    ctx.beginPath(); ctx.ellipse(0, -g.h/2, g.w/2 - 2, g.h/2 - 1, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a8a5a';
    ctx.beginPath(); ctx.ellipse(-2, -g.h/2 - 1, g.w/2 - 6, g.h/2 - 5, 0, 0, Math.PI*2); ctx.fill();
    // Eyes — glow
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.arc(-5, -g.h * 0.65, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -g.h * 0.65, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(-5, -g.h * 0.65, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -g.h * 0.65, 2, 0, Math.PI*2); ctx.fill();
    // Tendrils / feet
    ctx.strokeStyle = '#1a6a4a'; ctx.lineWidth = 3;
    const legOff = wf ? 4 : -4;
    ctx.beginPath(); ctx.moveTo(-6, -4); ctx.lineTo(-8 + legOff, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6, -4); ctx.lineTo(8 - legOff, 2); ctx.stroke();
    ctx.restore();
    // Slime trail
    if (wf) {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#1a6a4a';
      ctx.beginPath(); ctx.ellipse(cx - g.vx * 6, g.y + g.h - 2, 6, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawGoombas() {
  for (const g of [...goombas, ...flyers]) {
    if (g.dead) {
      if (g.deadTimer > 0) {
        const sx = g.x + g.w/2 - camera;
        ctx.globalAlpha = g.deadTimer / 40;
        ctx.fillStyle = g.flying ? '#6a1a9a' : '#1a6a4a';
        ctx.beginPath(); ctx.arc(sx, g.y + g.h/2, 8, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      continue;
    }
    drawEnemy(g);
  }
}

function drawFlagPole() {
  const sx = FLAG_X * TILE - camera;
  const t = performance.now() / 500;
  // Beacon pillar
  ctx.fillStyle = '#2a2040'; ctx.fillRect(sx + TILE/2 - 4, 40, 8, groundY * TILE - 40);
  ctx.fillStyle = '#4a3a70'; ctx.fillRect(sx + TILE/2 - 2, 40, 4, groundY * TILE - 40);
  // Pulsing orb at top
  for (let r = 24; r > 0; r -= 6) {
    ctx.globalAlpha = (0.08 + 0.06 * Math.sin(t)) * (24 - r) / 24;
    ctx.fillStyle = COLORS.crystalGlow;
    ctx.beginPath(); ctx.arc(sx + TILE/2, 40, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = COLORS.crystalGlow;
  ctx.beginPath(); ctx.arc(sx + TILE/2, 40, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(sx + TILE/2 - 2, 37, 3, 0, Math.PI*2); ctx.fill();
  // Energy rings rising
  for (let i = 0; i < 3; i++) {
    const ry = 40 + ((t * 60 + i * 40) % 180);
    ctx.globalAlpha = 1 - ry / 200;
    ctx.strokeStyle = COLORS.crystalGlow; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(sx + TILE/2, ry, 12, 4, 0, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const sx = player.x - camera;
  ctx.save();
  ctx.translate(sx + player.w / 2, player.y + player.h / 2);
  const scaleX = player.dir === -1 ? -1 : 1;
  if (player.spinning || player.homing) ctx.rotate((player.spinAngle * Math.PI) / 180);
  ctx.scale(scaleX, 1);
  if (axoImg.complete && axoImg.naturalWidth > 0)
    ctx.drawImage(axoImg, -player.w / 2, -player.h / 2, player.w, player.h);
  else {
    ctx.fillStyle = '#ff69b4';
    ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
  }
  ctx.restore();
}

function drawParticlesAll() {
  // Coin pops
  for (let i = coinParticles.length - 1; i >= 0; i--) {
    const p = coinParticles[i]; p.y += p.vy; p.vy += 0.3; p.life--;
    if (p.life <= 0) { coinParticles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = COLORS.orb;
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Dust
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const p = dustParticles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.r *= 0.93; p.life--;
    if (p.life <= 0) { dustParticles.splice(i, 1); continue; }
    ctx.globalAlpha = (p.life / p.maxLife) * 0.65;
    ctx.fillStyle = '#d4b483';
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Trail
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i]; p.r *= 0.9; p.life--;
    if (p.life <= 0) { trailParticles.splice(i, 1); continue; }
    ctx.globalAlpha = (p.life / p.maxLife) * 0.75;
    ctx.fillStyle = `hsl(${p.hue},100%,70%)`;
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Spindash sparks
  for (let i = spindashParticles.length - 1; i >= 0; i--) {
    const p = spindashParticles[i]; p.x += p.vx; p.y += p.vy; p.r *= 0.9; p.life--;
    if (p.life <= 0) { spindashParticles.splice(i, 1); continue; }
    ctx.globalAlpha = (p.life / p.maxLife) * 0.85;
    ctx.fillStyle = `hsl(${50 + Math.random()*20},100%,65%)`;
    ctx.beginPath(); ctx.arc(p.x - camera, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawDeathAnimation() {
  if (!dead || !player.dead) return;
  player.y += player.vy; player.vy += CFG.gravity;
  const sx = player.x - camera;
  ctx.save();
  ctx.translate(sx + player.w / 2, player.y + player.h / 2);
  ctx.rotate(Math.PI);
  if (axoImg.complete && axoImg.naturalWidth > 0)
    ctx.drawImage(axoImg, -player.w/2, -player.h/2, player.w, player.h);
  ctx.restore();
}

// ── Game loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  if (!dead) update(dt);

  // Draw with zoom
  ctx.save();
  // Deep space gradient sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#04041a');
  skyGrad.addColorStop(1, '#0f0a28');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Zoom: scale around player screen position
  const playerScreenX = player.x - camera;
  const playerScreenY = player.y - cameraY;
  ctx.translate(playerScreenX, playerScreenY);
  ctx.scale(zoom, zoom);
  ctx.translate(-playerScreenX / zoom, -playerScreenY / zoom);

  ctx.save();
  ctx.translate(0, -cameraY);

  drawBg();
  drawFlagPole();
  drawPipes();
  drawGround();
  drawPlatforms();
  drawCoins();
  drawGoombas();
  drawParticlesAll();
  if (!dead) drawPlayer();
  else drawDeathAnimation();

  ctx.restore();
  ctx.restore();

  // Screen-space overlays
  if (won) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#f8d800'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
    ctx.fillText('★ YOU WIN! ★', W/2, H/2 - 10);
    ctx.fillStyle = '#fff'; ctx.font = '24px monospace';
    ctx.fillText('Score: ' + String(score).padStart(6,'0'), W/2, H/2 + 30);
    ctx.fillText('Press R to play again', W/2, H/2 + 60);
  }

  updateHUD();
  requestAnimationFrame(loop);
}

player.x = 48;
player.y = groundY * TILE - player.h;
requestAnimationFrame(loop);

// ── Zoom slider ──────────────────────────────────────────────────────────────
const zoomSlider = document.getElementById('zoom-slider');
const zoomVal    = document.getElementById('zoom-val');
zoomSlider.addEventListener('input', () => {
  zoom = parseFloat(zoomSlider.value);
  zoomVal.textContent = zoom.toFixed(2) + 'x';
});

// ── Settings panel ────────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click', () =>
  document.getElementById('settings-panel').classList.toggle('open'));
document.addEventListener('keydown', e => {
  if (e.code === 'Escape') document.getElementById('settings-panel').classList.remove('open');
});

const sliders = [
  { id: 's-gravity',  vid: 'v-gravity',  key: 'gravity',       fmt: v => v.toFixed(2) },
  { id: 's-gravity1', vid: 'v-gravity1', key: 'gravity1',      fmt: v => v.toFixed(2) },
  { id: 's-gravity2', vid: 'v-gravity2', key: 'gravity2',      fmt: v => v.toFixed(2) },
  { id: 's-gravity3', vid: 'v-gravity3', key: 'gravity3',      fmt: v => v.toFixed(2) },
  { id: 's-jump1',    vid: 'v-jump1',    key: 'jump1',         fmt: v => v.toFixed(1) },
  { id: 's-jump2',    vid: 'v-jump2',    key: 'jump2',         fmt: v => v.toFixed(1) },
  { id: 's-jump3',    vid: 'v-jump3',    key: 'jump3',         fmt: v => v.toFixed(1) },
  { id: 's-window',   vid: 'v-window',   key: 'tripleWindow',  fmt: v => v + 'ms'     },
  { id: 's-speed',    vid: 'v-speed',    key: 'moveSpeed',     fmt: v => v.toFixed(1) },
  { id: 's-size',     vid: 'v-size',     key: 'axoSize',       fmt: v => v + 'px'     },
];

function syncSliders() {
  for (const s of sliders) {
    const el = document.getElementById(s.id);
    const vl = document.getElementById(s.vid);
    if (!el) continue;
    el.value = CFG[s.key];
    vl.textContent = s.fmt(CFG[s.key]);
  }
}

for (const s of sliders) {
  const el = document.getElementById(s.id);
  const vl = document.getElementById(s.vid);
  if (!el) continue;
  el.addEventListener('input', () => { CFG[s.key] = parseFloat(el.value); vl.textContent = s.fmt(CFG[s.key]); });
}

document.getElementById('s-reset').addEventListener('click', () => { Object.assign(CFG, DEFAULTS); syncSliders(); });
syncSliders();
</script>
